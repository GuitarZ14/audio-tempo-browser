<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>变速伴奏生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;color:#fff;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:28px;margin-bottom:8px}
.header p{color:#aaa;font-size:14px}
.card{background:rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:16px}
.ul{border:2px dashed rgba(78,205,196,.4);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.ul:hover{border-color:#4ecdc4;background:rgba(78,205,196,.05)}
.ul .ic{font-size:32px;margin-bottom:6px}
.ul .tx{font-size:14px;color:#ccc}
.ul .nt{font-size:11px;color:#888;margin-top:4px}
.bi{width:100%;height:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;text-align:center;font-size:20px;color:#fff;outline:none;margin-top:12px}
.bi:focus{border-color:#4ecdc4}
.bn{width:100%;height:52px;background:linear-gradient(135deg,#4ecdc4,#44b09e);color:#fff;border:none;border-radius:26px;font-size:18px;font-weight:600;cursor:pointer;margin-top:16px}
.bn:disabled{opacity:.5;cursor:not-allowed}
.st{text-align:center;padding:20px;display:none}
.st.sh{display:block}
.pb{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:12px;overflow:hidden}
.pb-bar{height:100%;background:#4ecdc4;width:0;transition:width .3s}
.ra{display:none;margin-top:20px}
.ra.sh{display:block}
.ri{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.ri:last-child{border-bottom:none}
.bl{font-size:20px;font-weight:700;color:#4ecdc4}
.ac{display:flex;gap:8px}
.ac button,.ac a{padding:8px 20px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;color:#fff}
.pb2{background:#4ecdc4}
.db{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.ft{text-align:center;padding:30px;color:#555;font-size:12px}
.er{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);color:#ff6b6b;padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.sh{display:block}
.ap-w{display:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
.ap-w.sh{display:block}
.ap-pb{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:4px;cursor:pointer;position:relative}
.ap-pb-in{height:100%;background:linear-gradient(90deg,#4ecdc4,#44b09e);border-radius:4px;width:0;pointer-events:none}
.ap-tm{text-align:right;color:#888;font-size:12px;margin-top:4px}
.ps{width:100%;margin:8px 0;-webkit-appearance:none;appearance:none;height:6px;background:rgba(255,255,255,.1);border-radius:3px;outline:none}
.ps::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#4ecdc4;cursor:pointer}
.ps::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#4ecdc4;cursor:pointer;border:none}
.ps-l{display:flex;justify-content:space-between;color:#888;font-size:12px}
.lb{display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer}
.lb span{font-size:14px;color:#ccc}
.pv{display:block;width:100%;margin-top:8px;padding:10px;border-radius:20px;border:1px solid rgba(78,205,196,.4);background:transparent;color:#4ecdc4;font-size:14px;cursor:pointer}
.pv:hover{background:rgba(78,205,196,.1)}
.sc{display:flex;gap:0;margin:0 0 12px}
.sc button{flex:1;padding:9px;border:1px solid rgba(78,205,196,.4);background:transparent;color:#aaa;cursor:pointer;font-size:14px;transition:all .15s}
.sc button:first-child{border-radius:10px 0 0 10px}
.sc button:last-child{border-radius:0 10px 10px 0}
.sc button.act{background:#4ecdc4;color:#fff;border-color:#4ecdc4}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎵 变速伴奏生成器</h1>
<p>上传音频，自动生成多种速度的伴奏</p>
</div>
<div class="er" id="er"></div>
<div class="card">
<div class="ul" id="ul">
<div class="ic" id="uic">📁</div>
<div class="tx" id="utx">点击选择音频文件</div>
<div class="nt" id="unt">支持 MP3 / WAV / M4A</div>
<div class="fi" id="fi" style="display:none">
<div class="ap-pb" id="upb" onclick="event.stopPropagation();upbSeek(event)" style="margin-top:8px"><div class="ap-pb-in" id="upi"></div></div>
<div style="display:flex;align-items:center;gap:8px;margin-top:4px"><button id="upb-btn" class="pb2" onclick="event.stopPropagation();opPlay()" style="flex:none;padding:3px 12px;border-radius:12px;font-size:12px">▶</button><span id="fin" style="font-size:13px;color:#4ecdc4;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><span class="ap-tm" id="utm" style="margin:0;font-size:11px">0:00 / 0:00</span><button id="cf" class="pb2" onclick="event.stopPropagation();gi.click()" style="flex:none;padding:3px 10px;border-radius:12px;font-size:11px">更换</button></div>
<div style="font-size:11px;color:#888;margin-top:2px;text-align:left" id="bpmn"></div>
</div>
</div>
<input type="file" id="gi" accept=".mp3,.wav,.m4a,.aac,.ogg" hidden>
<audio id="op" hidden></audio>
</div>
</div>
<div class="card">
<div style="font-size:14px;color:#aaa;margin-bottom:10px">速度模式</div>
<div class="sc" id="sm">
<button class="act" data-m="bpm">BPM</button>
<button data-m="pct">百分比</button>
</div>
<div id="sb">
<span style="font-size:14px;color:#aaa">目标速度（BPM）</span>
<input class="ps" type="range" id="bps" min="20" max="200" value="100">
<div class="ps-l"><span>最慢</span><span>原速</span></div>
<div style="text-align:center;font-size:14px;color:#4ecdc4;font-weight:600;margin-top:2px" id="bpsv">100</div>
</div>
<div id="sp" style="display:none">
<span style="font-size:14px;color:#aaa">目标速度（百分比）</span>
  <input class="ps" type="range" id="pct" min="30" max="150" value="100">
<div class="ps-l"><span>30%</span><span>150%</span></div>
<div style="text-align:center;font-size:14px;color:#4ecdc4;font-weight:600;margin-top:2px" id="pctv">100%</div>
  <p style="color:#666;font-size:12px;margin-top:4px">拖动选择原曲速度的百分比</p>
</div>
</div>
</div>
<div class="card">
<div style="font-size:14px;color:#aaa;margin-bottom:10px">音频类型</div>
<div class="sc" id="am">
<button class="act" data-m="vocal">🎤 初始音频</button>
<button data-m="inst">🎵 去人声伴奏</button>
</div>
<div id="ai" style="display:none">
<span style="font-size:12px;color:#888">消除强度</span>
<input class="ps" type="range" id="vra" min="30" max="80" value="55">
<div class="ps-l"><span>弱</span><span>强</span></div>
</div>
</div>
<button class="bn" id="go">🎧 生成伴奏</button>
<div class="st" id="st"><p id="stx">处理中...</p><div class="pb"><div class="pb-bar" id="pbb"></div></div></div>
<div class="card ra" id="ra"><div id="rl"></div><div class="ap-w" id="apw"><div class="ap-pb" id="appb" onclick="sk(event)"><div class="ap-pb-in" id="appi"></div></div><div class="ap-tm" id="aptm">0:00 / 0:00</div></div></div>
<div class="ft"></div>
</div>
<audio id="ap" style="display:none"></audio>
<script>
let actx, file, obpm = 120, bn = '', audioBuf = null
let $ = id => document.getElementById(id)

function getActx() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx }

async function processFile(f) {
  if (!f) return
  if (f.size > 100e6) { err('文件过大（限 100MB）'); return }
  file = f; bn = f.name.replace(/\.[^.]+$/, '')
  hideErr(); audioBuf = null
  $('uic').style.display = 'none'; $('utx').style.display = 'none'; $('unt').style.display = 'none'
  $('fi').style.display = 'block'; $('fin').textContent = f.name; $('utm').textContent = '0:00 / 0:00'; $('upi').style.width = '0%'
  try {
    let buf = await getActx().decodeAudioData(await f.arrayBuffer())
    audioBuf = buf
    let bpm = detectBpm(buf)
    if (bpm) { obpm = bpm; let sig = detectSig(buf, bpm) || '4/4'; $('bpmn').textContent = '⏱ ' + obpm + ' BPM · ' + sig
      $('pct').value = 100; $('pctv').textContent = '100%'; $('bps').max = obpm; $('bps').value = obpm; $('bpsv').textContent = obpm }
    let op = $('op'); if (op.src) URL.revokeObjectURL(op.src)
    op.src = URL.createObjectURL(f)
  } catch(e) { console.error('BPM 检测失败', e); $('bpmn').textContent = 'BPM 检测失败' }
}

$('gi').onchange = e => { let f = e.target.files[0]; if (f) processFile(f) }
;(ul => { ul.addEventListener('dragover', e => { e.preventDefault(); ul.style.borderColor = '#4ecdc4' })
  ul.addEventListener('dragleave', () => { ul.style.borderColor = '' })
  ul.addEventListener('drop', e => { e.preventDefault(); ul.style.borderColor = ''; let f = e.dataTransfer.files[0]; if (f) processFile(f) })
})(document.querySelector('.ul'))
document.querySelectorAll('#uic,#utx,#unt').forEach(el => el.addEventListener('click', () => { if (!$('fi').style.display || $('fi').style.display === 'none') $('gi').click() }))
let previewSrc = null; let previewTimer = null; let previewVer = 0; let pStartTime = 0
$('pct').oninput = () => {
  let v = parseInt($('pct').value); $('pctv').textContent = v + '%'
  if (obpm) { $('bpsv').textContent = Math.round(obpm * v / 100); $('bps').value = Math.round(obpm * v / 100) }
}
$('pct').onchange = () => { if (audioBuf) genPreview() }
function stopPreview() {
  if (previewTimer) { clearTimeout(previewTimer); previewTimer = null }
  if (previewSrc) { try { previewSrc.stop() } catch(e) {} previewSrc = null }
}
function genPreview() {
  if (!audioBuf) return
  if (previewTimer) clearTimeout(previewTimer)
  let ctx = getActx(); if (ctx.state === 'suspended') ctx.resume()
  try { if (!$('op').paused) { $('op').pause(); $('upb-btn').textContent = '▶' } } catch(e) {}
  if (vPreviewSrc) { try { vPreviewSrc.stop() } catch(e) {} vPreviewSrc = null }
  if (vPreviewTimer) { clearTimeout(vPreviewTimer); vPreviewTimer = null }
  let m = document.querySelector('#sm .act').dataset.m
  let t = m === 'bpm' ? parseInt($('bps').value) : Math.round(obpm * parseInt($('pct').value) / 100)
  if (!t || t < 20) return
  let opPos = $('op').duration ? $('op').currentTime : 0
  let off = previewSrc ? Math.max(0, ctx.currentTime - pStartTime) : opPos * obpm / t
  previewVer++; let myVer = previewVer
  previewTimer = setTimeout(async () => {
    previewTimer = null
    if (myVer !== previewVer) return
    try {
      if (myVer !== previewVer) return
      let ratio = t / obpm
      let stretched = timeStretch(audioBuf, ratio)
      if (myVer !== previewVer) return
      stopPreview()
      if (myVer !== previewVer) return
      let src = ctx.createBufferSource()
      src.buffer = stretched; src.connect(ctx.destination)
      src.onended = () => { if (previewSrc === src) { previewSrc = null } }
      src.start(0, off); previewSrc = src; pStartTime = ctx.currentTime - off
    } catch(e) {}
  }, 50)
}
$('bps').oninput = () => {
  let v = parseInt($('bps').value); $('bpsv').textContent = v
  if (obpm) { let p = Math.round(v / obpm * 100); $('pct').value = Math.max(30, Math.min(150, p)); $('pctv').textContent = $('pct').value + '%' }
}
$('bps').onchange = () => { if (audioBuf) genPreview() }
let sm = document.querySelectorAll('#sm button'); let am = document.querySelectorAll('#am button')
sm.forEach(b => b.onclick = () => { sm.forEach(x => x.classList.remove('act')); b.classList.add('act'); $('sb').style.display = b.dataset.m === 'bpm' ? 'block' : 'none'; $('sp').style.display = b.dataset.m === 'pct' ? 'block' : 'none'; stopPreview(); if (audioBuf) genPreview() })
am.forEach(b => b.onclick = () => { am.forEach(x => x.classList.remove('act')); b.classList.add('act'); $('ai').style.display = b.dataset.m === 'inst' ? 'block' : 'none'; if (b.dataset.m === 'inst' && audioBuf) { if (previewSrc) { try { previewSrc.stop() } catch(e) {} previewSrc = null }; if (previewTimer) { clearTimeout(previewTimer); previewTimer = null }; genVPreview() } })

let vPreviewSrc = null; let vPreviewTimer = null; let vPreviewVer = 0; let vStartTime = 0
$('vra').onchange = () => { if (audioBuf) genVPreview() }
function genVPreview() {
  if (!audioBuf) return
  let ctx = getActx(); if (ctx.state === 'suspended') ctx.resume()
  if (audioBuf.numberOfChannels < 2) { err('单声道音频无法去人声'); return }
  if (vPreviewTimer) clearTimeout(vPreviewTimer)
  let off = vPreviewSrc ? Math.max(0, ctx.currentTime - vStartTime) : ($('op').duration ? $('op').currentTime : 0)
  try { if (!$('op').paused) { $('op').pause(); $('upb-btn').textContent = '▶' } } catch(e) {}
  if (previewSrc) { try { previewSrc.stop() } catch(e) {} previewSrc = null }
  if (previewTimer) { clearTimeout(previewTimer); previewTimer = null }
  vPreviewVer++; let myVer = vPreviewVer
  vPreviewTimer = setTimeout(async () => {
    vPreviewTimer = null; if (myVer !== vPreviewVer) return
    try {
      if (myVer !== vPreviewVer) return
      let processed = removeCenter(audioBuf, parseInt($('vra').value) / 100)
      if (myVer !== vPreviewVer) return
      if (vPreviewSrc) { try { vPreviewSrc.stop() } catch(e) {} vPreviewSrc = null }
      if (myVer !== vPreviewVer) return
      let src = ctx.createBufferSource()
      src.buffer = processed; src.connect(ctx.destination)
      src.onended = () => { if (vPreviewSrc === src) { vPreviewSrc = null } }
      src.start(0, off); vPreviewSrc = src; vStartTime = ctx.currentTime - off
    } catch(e) {}
  }, 100)
}

$('go').onclick = async () => {
  if (!file) { err('请先选择音频'); return }
  let sm = document.querySelector('#sm .act').dataset.m
  let tgts
  if (sm === 'bpm') {
    tgts = [parseInt($('bps').value)]
  } else {
    tgts = [Math.round(obpm * parseInt($('pct').value) / 100)]
  }
  if (!tgts.length) { err('请填写目标速度'); return }

  $('go').disabled = true; $('st').classList.add('sh'); $('ra').classList.remove('sh'); $('rl').innerHTML = ''; pb(0); hideErr()

  try {
    actx = getActx()
    let buf = audioBuf
    if (!buf) buf = await actx.decodeAudioData(await file.arrayBuffer())
    pb(5)
    if (document.querySelector('#am .act').dataset.m === 'inst') { buf = removeCenter(buf, parseInt($('vra').value) / 100); pb(7) }
    let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
    stx('原始 BPM：' + obpm + (buf ? ' · ' + (detectSig(buf, obpm) || '4/4') : '')); pb(10)

    for (let i = 0; i < tgts.length; i++) {
      let t = tgts[i]; stx('处理 ' + t + ' BPM...'); pb(15 + 75 / tgts.length * i)
      let ratio = t / obpm
      if (ratio < 0.25) ratio = 0.25
      if (ratio > 4) ratio = 4
      let result = timeStretch(buf, ratio)

      let bd = 60 / t, cls = Math.floor(sr * 0.015), bl = Math.floor(sr * bd)
      let fin = result

      stx('生成 ' + t + ' BPM...'); pb(85 + 10 / tgts.length * i)
      let wav = toWav(fin)
      let url = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}))
      let d = document.createElement('div'); d.className = 'ri'
      d.innerHTML = `<div><div class="bl">${t} BPM</div><div style="font-size:12px;color:#888">${bn}_${t}bpm.wav</div></div><div class="ac"><button class="pb2" data-url="${url}" onclick="tp(this)">▶ 播放</button><a class="db" href="${url}" download="${bn}_${t}bpm.wav">下载</a></div>`
      $('rl').appendChild(d); $('ra').classList.add('sh')
    }
    stx('✅ 完成！'); pb(100)
  } catch(e) { err('处理失败: ' + e.message); console.error(e) }
  $('go').disabled = false
}

function tp(btn) {
  let ap = $('ap'), url = btn.dataset.url
  if (ap.src === url && !ap.paused) { ap.pause(); btn.textContent = '▶ 播放'; $('apw').classList.remove('sh') }
  else if (ap.src === url && ap.paused) { ap.play(); btn.textContent = '⏸ 暂停'; $('apw').classList.add('sh') }
  else {
    $('apw').classList.add('sh')
    ap.src = url; ap.play(); btn.textContent = '⏸ 暂停'
    document.querySelectorAll('#rl .pb2').forEach(b => { if (b !== btn) b.textContent = '▶ 播放' })
  }
}

function detectBpm(buf) {
  let sr = buf.sampleRate, d = buf.getChannelData(0), hop = Math.floor(sr * 0.01)
  let env = []
  for (let i = 0; i + 1 < d.length; i += hop) {
    let e = 0, n = 0, lim = Math.min(hop, d.length - i - 1)
    for (let j = 0; j < lim; j++) { let t = d[i + j + 1] - d[i + j]; e += t * t; n++ }
    env.push(Math.sqrt(e / n))
  }
  let avg = 0; for (let v of env) avg += v; avg /= env.length
  for (let i = 0; i < env.length; i++) env[i] -= avg
  if (env.length < 50) return null
  let minL = Math.round(60 / 300 * sr / hop), maxL = Math.round(60 / 40 * sr / hop)
  let bestL = minL, bestS = 0
  for (let lag = minL; lag <= maxL; lag++) {
    let s = 0, n = 0
    for (let i = 0; i + lag < env.length; i++) { s += env[i] * env[i + lag]; n++ }
    s = n > 0 ? s / n : 0
    if (s > bestS) { bestS = s; bestL = lag }
  }
  let bpm = Math.round(60 / (bestL * hop / sr))
  // Take top candidates and find the most plausible one
  let cand = [{ lag: Math.round(bestL / 2), mul: 2 }, { lag: Math.round(bestL * 2 / 3), mul: 1.5 },
    { lag: Math.round(bestL / 3), mul: 3 }, { lag: Math.round(bestL * 2), mul: 0.5 },
    { lag: Math.round(bestL * 3 / 2), mul: 2/3 }]
  for (let c of cand) {
    if (c.lag < minL || c.lag > maxL) continue
    let s = 0, n = 0
    for (let i = 0; i + c.lag < env.length; i++) { s += env[i] * env[i + c.lag]; n++ }
    s = n > 0 ? s / n : 0
    if (s > bestS * 0.5) { let nb = Math.round(bpm * c.mul); if (nb >= 60 && nb <= 180) { bpm = nb; break } }
  }
  return (bpm >= 40 && bpm <= 200) ? bpm : null
}

function detectSig(buf, bpm) {
  if (!bpm || bpm < 40) return null
  let sr = buf.sampleRate, d = buf.getChannelData(0)
  let bl = Math.round(60 / bpm * sr)
  if (bl < 100) return null
  let energies = []
  for (let i = 0; i + bl < d.length; i += bl) {
    let e = 0; for (let j = 0; j < bl; j++) e += Math.abs(d[i + j])
    energies.push(e / bl)
  }
  if (energies.length < 8) return null
  let maxP = Math.min(6, Math.floor(energies.length / 2)), bestP = 4, bestS = 0
  for (let p = 2; p <= maxP; p++) {
    let s = 0, n = 0
    for (let i = 0; i + p < energies.length; i++) { s += energies[i] * energies[i + p]; n++ }
    s = n > 0 ? s / n : 0
    if (s > bestS) { bestS = s; bestP = p }
  }
  return { 2: '2/4', 3: '3/4', 4: '4/4', 5: '5/4', 6: '6/8' }[bestP] || '4/4'
}

function fmt(s) { let m = Math.floor(s / 60), se = Math.floor(s % 60); return m + ':' + (se < 10 ? '0' : '') + se }

function sk(e) {
  let ap = $('ap')
  if (!ap.duration) return
  let rect = e.currentTarget.getBoundingClientRect()
  ap.currentTime = ((e.clientX - rect.left) / rect.width) * ap.duration
}

$('ap').addEventListener('timeupdate', () => {
  let ap = $('ap'), pi = $('appi'), tm = $('aptm')
  if (ap.duration) { pi.style.width = (ap.currentTime / ap.duration * 100) + '%'; tm.textContent = fmt(ap.currentTime) + ' / ' + fmt(ap.duration) }
})
$('ap').addEventListener('ended', () => {
  $('apw').classList.remove('sh')
  document.querySelectorAll('#rl .pb2').forEach(b => b.textContent = '▶ 播放')
})

$('op').addEventListener('timeupdate', () => {
  let op = $('op'), p = op.duration ? op.currentTime / op.duration * 100 : 0, t = fmt(op.currentTime) + ' / ' + fmt(op.duration)
  if (op.duration) { $('upi').style.width = p + '%'; $('utm').textContent = t }
})
let opDrag = false
$('upb').addEventListener('mousedown', e => { opDrag = true; upbSeek(e) })
document.addEventListener('mousemove', e => { if (opDrag) { e.preventDefault(); upbSeek(e) } })
document.addEventListener('mouseup', () => { opDrag = false })
$('upb').addEventListener('touchstart', e => { opDrag = true; upbSeek(e.touches[0]) })
document.addEventListener('touchmove', e => { if (opDrag) { e.preventDefault(); upbSeek(e.touches[0]) } })
document.addEventListener('touchend', () => { opDrag = false })
function upbSeek(e) {
  let op = $('op'); if (!op.duration) return
  let rect = $('upb').getBoundingClientRect()
  op.currentTime = ((e.clientX - rect.left) / rect.width) * op.duration
}
function opPlay() {
  let op = $('op'), b = $('upb-btn')
  if (op.paused) { op.play(); b.textContent = '⏸' }
  else { op.pause(); b.textContent = '▶' }
}
$('op').addEventListener('ended', () => { $('upb-btn').textContent = '▶' })

function removeCenter(buf, amt) {
  if (buf.numberOfChannels < 2) return buf
  let ln = buf.length, out = actx.createBuffer(2, ln, buf.sampleRate)
  let l = buf.getChannelData(0), r = buf.getChannelData(1)
  let ol = out.getChannelData(0), or = out.getChannelData(1)
  for (let i = 0; i < ln; i++) { let m = (l[i] + r[i]) * 0.5; ol[i] = l[i] - m * amt; or[i] = r[i] - m * amt }
  return out
}

function timeStretchFast(buf, sFactor) {
  let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
  let newLen = Math.round(ln / sFactor), out = actx.createBuffer(ch, newLen, sr)
  let fSize = 2048, aHop = 512, sHop = Math.round(aHop / sFactor)
  let win = new Float32Array(fSize)
  for (let j = 0; j < fSize; j++) win[j] = 0.5 * (1 - Math.cos(2 * Math.PI * j / fSize))
  for (let c = 0; c < ch; c++) {
    let inp = buf.getChannelData(c), oup = out.getChannelData(c), nrm = new Float32Array(newLen)
    let aPos = 0, sPos = 0
    while (aPos + fSize <= ln && sPos + fSize <= newLen) {
      for (let j = 0; j < fSize; j++) { let idx = sPos + j; oup[idx] += inp[aPos + j] * win[j]; nrm[idx] += win[j] }
      aPos += aHop; sPos += sHop
    }
    for (let j = 0; j < newLen; j++) if (nrm[j] > 0.001) oup[j] /= nrm[j]
  }
  return out
}

function timeStretch(buf, sFactor) {
  let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
  let newLen = Math.round(ln / sFactor)
  let out = actx.createBuffer(ch, newLen, sr)
  let fSize = 2048, aHop = 512, sHop = Math.round(aHop / sFactor)
  let srchD = Math.min(Math.round(aHop * 0.2), 50), srchL = 60
  let win = new Float32Array(fSize)
  for (let j = 0; j < fSize; j++) win[j] = 0.5 * (1 - Math.cos(2 * Math.PI * j / fSize))

  for (let c = 0; c < ch; c++) {
    let inp = buf.getChannelData(c), oup = out.getChannelData(c)
    if (Math.abs(sFactor - 1) < 0.01) {
      for (let j = 0; j < Math.min(ln, newLen); j++) oup[j] = inp[j]
      continue
    }
    let nrm = new Float32Array(newLen)
    let idealA = 0, sPos = 0
    while (idealA + fSize <= ln && sPos + fSize <= newLen) {
      let bestA = idealA
      if (sPos > 0) {
        let olap = Math.min(fSize - sHop, sPos, srchL)
        if (olap > 0) {
          let bestScore = -Infinity
          for (let d = -srchD; d <= srchD; d++) {
            let ca = idealA + d
            if (ca < 0 || ca + fSize > ln) continue
            let score = 0
            for (let j = 0; j < olap; j++) score += inp[ca + j] * oup[sPos + j]
            if (score > bestScore) { bestScore = score; bestA = ca }
          }
        }
      }
      for (let j = 0; j < fSize; j++) {
        let idx = sPos + j
        oup[idx] += inp[bestA + j] * win[j]
        nrm[idx] += win[j]
      }
      idealA += aHop; sPos += sHop
    }
    for (let j = 0; j < newLen; j++) if (nrm[j] > 0.001) oup[j] /= nrm[j]
  }
  return out
}

function toWav(buf) {
  let ch = buf.numberOfChannels, sr = buf.sampleRate, ln = buf.length
  let dl = ln * ch * 2, a = new ArrayBuffer(44 + dl), v = new DataView(a)
  let w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)) }
  w(0,'RIFF'); v.setUint32(4,36+dl,true); w(8,'WAVE')
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true)
  v.setUint16(22,ch,true); v.setUint32(24,sr,true)
  v.setUint32(28,sr*ch*2,true); v.setUint16(32,ch*2,true); v.setUint16(34,16,true)
  w(36,'data'); v.setUint32(40,dl,true)
  let o = 44
  for (let i = 0; i < ln; i++) for (let c = 0; c < ch; c++) {
    let s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]))
    v.setInt16(o, s < 0 ? s * 32768 : s * 32767, true); o += 2
  }
  return a
}

function stx(t) { $('stx').textContent = t }
function pb(p) { $('pbb').style.width = p + '%' }
function err(m) { $('er').textContent = m; $('er').style.display = 'block' }
function hideErr() { $('er').style.display = 'none' }
