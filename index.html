<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>变速伴奏生成器</title>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12/dist/esm/ffmpeg.min.js" type="module"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;color:#fff;padding:20px}
    .container{max-width:500px;margin:0 auto}
    .header{text-align:center;padding:30px 0 20px}
    .header h1{font-size:28px;margin-bottom:8px}
    .header p{color:#aaa;font-size:14px}
    .card{background:rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:16px}
    .upload-label{display:block;border:2px dashed rgba(78,205,196,.4);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s}
    .upload-label:hover{border-color:#4ecdc4;background:rgba(78,205,196,.05)}
    .upload-label .icon{font-size:48px;margin-bottom:12px}
    .upload-label .text{font-size:16px;color:#ccc}
    .upload-label .hint{font-size:12px;color:#888;margin-top:8px}
    input[type="file"]{display:none}
    .bpm-input{width:100%;height:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;text-align:center;font-size:20px;color:#fff;outline:none;margin-top:12px}
    .bpm-input:focus{border-color:#4ecdc4}
    .submit-btn{width:100%;height:52px;background:linear-gradient(135deg,#4ecdc4,#44b09e);color:#fff;border:none;border-radius:26px;font-size:18px;font-weight:600;cursor:pointer;margin-top:16px}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .status{text-align:center;padding:20px;display:none}
    .status.show{display:block}
    .progress{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:12px;overflow:hidden}
    .progress-bar{height:100%;background:#4ecdc4;width:0;transition:width .3s}
    .result-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.06)}
    .result-item:last-child{border-bottom:none}
    .bpm-label{font-size:20px;font-weight:700;color:#4ecdc4}
    .result-actions{display:flex;gap:8px}
    .btn{padding:8px 20px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none}
    .btn-play{background:#4ecdc4;color:#fff}
    .btn-download{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
    .footer{text-align:center;padding:30px;color:#555;font-size:12px}
    .error{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);color:#ff6b6b;padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
    .file-name{display:none;padding:12px;background:rgba(78,205,196,.1);border-radius:8px;font-size:14px;color:#4ecdc4;text-align:center;margin-top:12px}
    .file-name.show{display:block}
    .hidden{display:none}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎵 变速伴奏生成器</h1>
    <p>上传音频，自动生成多种速度的伴奏</p>
  </div>
  <div class="error" id="error"></div>

  <div class="card">
    <div class="upload-label" id="uploadLabel" onclick="document.getElementById('fileInput').click()">
      <div class="icon">📁</div>
      <div class="text">点击选择音频文件</div>
      <div class="hint">支持 MP3 / WAV / M4A</div>
    </div>
    <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.aac,.ogg" hidden>
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="card">
    <span style="font-size:14px;color:#aaa">目标速度（BPM）</span>
    <input class="bpm-input" type="text" id="bps">
    <p style="color:#666;font-size:12px;margin-top:8px">用空格隔开，例如：60 80 100 120 140</p>
  </div>

  <button class="submit-btn" id="submitBtn" disabled>⏳ 加载中...</button>

  <div class="status" id="status">
    <p id="statusText">准备中...</p>
    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="card hidden" id="resultArea">
    <span style="font-size:14px;color:#aaa;display:block;margin-bottom:8px">生成结果</span>
    <div id="resultList"></div>
  </div>

  <div class="footer">每段音频自动添加 4 拍预备拍</div>
</div>

<script type="module">
import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12/dist/esm/ffmpeg.min.js'
import { toBlobURL, fetchFile } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12/dist/esm/index.min.js'

const ffmpeg = new FFmpeg()
let loaded = false
let audioData = null
let audioName = ''

const $ = id => document.getElementById(id)

async function loadFFmpeg() {
  try {
    $('submitBtn').textContent = '⏳ 加载 ffmpeg (约 30MB)...'
    const base = 'https://unpkg.com/@ffmpeg/core@0.12/dist/esm'
    await ffmpeg.load({
      coreURL: await toBlobURL(`${base}/ffmpeg-core.js`, 'text/javascript'),
      wasmURL: await toBlobURL(`${base}/ffmpeg-core.wasm`, 'application/wasm')
    })
    loaded = true
    $('submitBtn').textContent = '🎧 生成伴奏'
    $('submitBtn').disabled = false
  } catch (e) {
    $('submitBtn').textContent = '❌ 加载失败，刷新重试'
    console.error(e)
  }
}

$('fileInput').onchange = e => {
  const file = e.target.files[0]
  if (!file) return
  if (file.size > 100 * 1024 * 1024) { showError('文件过大（限 100MB）'); return }
  audioName = file.name.replace(/\.[^.]+$/, '')
  $('fileName').textContent = '✅ ' + file.name
  $('fileName').classList.add('show')
  audioData = file
  hideError()
}

$('submitBtn').onclick = async () => {
  if (!loaded) { showError('ffmpeg 加载中，请稍候'); return }
  if (!audioData) { showError('请先选择音频文件'); return }

  const targets = $('bps').value.trim().split(/[\s,，、]+/).map(Number).filter(n => !isNaN(n) && n > 0)
  if (targets.length === 0) { showError('请填写至少一个目标速度'); return }

  $('submitBtn').disabled = true
  $('status').classList.add('show')
  $('resultArea').classList.add('hidden')
  $('resultList').innerHTML = ''
  setProgress(0)

  try {
    setStatus('正在分析音频...')
    await ffmpeg.writeFile('input', await fetchFile(audioData))

    setStatus('正在检测原始 BPM...')
    setProgress(10)
    let originalBpm = 120
    try {
      await ffmpeg.exec(['-i', 'input', '-ac', '1', '-af', 'astats=metadata=1', '-f', 'null', '-'])
      const log = await ffmpeg.readFile('ffmpeg-output')
      originalBpm = 120
    } catch {}

    for (let i = 0; i < targets.length; i++) {
      const target = targets[i]
      setStatus(`正在生成 ${target} BPM...`)
      setProgress(20 + Math.floor(60 / targets.length * i))

      const ratio = target / originalBpm
      const filter = ratio >= 0.5 && ratio <= 2
        ? `atempo=${ratio.toFixed(4)}`
        : 'atempo=0.5,' + `atempo=${(ratio / Math.pow(0.5, Math.ceil(-Math.log2(ratio)))).toFixed(4)}`.repeat(Math.ceil(-Math.log2(ratio)))

      await ffmpeg.exec(['-i', 'input', '-filter:a', `atempo=${Math.max(0.5, ratio).toFixed(4)}`, '-y', 'adjusted.wav'])
      setStatus(`正在添加预备拍...`)

      const beatDur = 60 / target
      const sampleRate = 44100
      const clickLen = Math.floor(sampleRate * 0.015)
      const beatLen = Math.floor(sampleRate * beatDur)
      const totalSamples = beatLen * 4
      const headerSize = 44
      const dataSize = totalSamples * 2
      const wav = new ArrayBuffer(headerSize + dataSize)
      const view = new DataView(wav)

      const writeStr = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)) }
      writeStr(0, 'RIFF'); view.setUint32(4, 36 + dataSize, true); writeStr(8, 'WAVE')
      writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true)
      view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true)
      view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true)
      writeStr(36, 'data'); view.setUint32(40, dataSize, true)

      for (let b = 0; b < 4; b++) {
        for (let j = 0; j < clickLen; j++) {
          const t = j / sampleRate
          const val = Math.max(-32767, Math.min(32767, Math.floor(Math.sin(1000 * 2 * Math.PI * t) * 30000 * (1 - t / 0.015))))
          const pos = headerSize + (b * beatLen + j) * 2
          view.setInt16(pos, val, true)
        }
      }

      await ffmpeg.writeFile('countin.wav', new Uint8Array(wav))
      await ffmpeg.exec(['-i', 'countin.wav', '-i', 'adjusted.wav', '-filter_complex', '[0:a][1:a]concat=n=2:v=0:a=1[a]', '-map', '[a]', '-y', `output.wav`])

      setStatus(`正在处理最终文件...`)
      const data2 = await ffmpeg.readFile('output.wav')
      const blob = new Blob([data2], { type: 'audio/wav' })
      const url = URL.createObjectURL(blob)

      const div = document.createElement('div')
      div.className = 'result-item'
      div.innerHTML = `
        <div><div class="bpm-label">${target} BPM</div><div style="font-size:12px;color:#888;margin-top:4px">${audioName}_${target}bpm.wav</div></div>
        <div class="result-actions">
          <button class="btn btn-play" onclick="document.getElementById('player').src='${url}';this.textContent='⏹ 暂停'" onblur="this.textContent='▶ 播放'">▶ 播放</button>
          <a class="btn btn-download" href="${url}" download="${audioName}_${target}bpm.wav">下载</a>
        </div>`
      $('resultList').appendChild(div)
    }

    setProgress(100)
    setStatus('✅ 生成完成！')
    $('resultArea').classList.remove('hidden')
  } catch (e) {
    showError('处理失败：' + e.message)
    console.error(e)
  }
  $('submitBtn').disabled = false
}

function setStatus(text) { $('statusText').textContent = text }
function setProgress(pct) { $('progressBar').style.width = pct + '%' }
function showError(msg) { $('error').textContent = msg; $('error').style.display = 'block' }
function hideError() { $('error').style.display = 'none' }

loadFFmpeg()
</script>
<script>document.write('<audio id="player" style="display:none"></audio>')</script>
</body>
</html>
