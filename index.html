<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>变速伴奏生成器</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#f0f4f8,#e2e8f0);min-height:100vh;color:#1a202c;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:28px;margin-bottom:8px;color:#1a202c}
.header p{color:#718096;font-size:14px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.ul{border:none;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s}
.ul:hover{background:rgba(78,205,196,.06)}
.ul .ic{font-size:32px;margin-bottom:6px}
.ul .tx{font-size:14px;color:#4a5568}
.ul .nt{font-size:11px;color:#a0aec0;margin-top:4px}
.bi{width:100%;height:48px;background:#edf2f7;border:1px solid #e2e8f0;border-radius:10px;text-align:center;font-size:20px;color:#1a202c;outline:none;margin-top:12px}
.bi:focus{border-color:#4ecdc4}
.bn{width:100%;height:52px;background:linear-gradient(135deg,#4ecdc4,#44b09e);color:#fff;border:none;border-radius:26px;font-size:18px;font-weight:600;cursor:pointer;margin-top:16px}
.bn:disabled{opacity:.5;cursor:not-allowed}
.st{text-align:center;padding:20px;display:none;color:#4a5568}
.st.sh{display:block}
.pb{width:100%;height:6px;background:#e2e8f0;border-radius:3px;margin-top:12px;overflow:hidden}
.pb-bar{height:100%;background:#4ecdc4;width:0;transition:width .3s}
.ra{display:none;margin-top:20px}
.ra.sh{display:block}
.ri{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #e2e8f0}
.ri:last-child{border-bottom:none}
.bl{font-size:20px;font-weight:700;color:#4ecdc4}
.ac{display:flex;gap:8px}
.ac button,.ac a{padding:8px 20px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;color:#fff}
.pb2{background:#4ecdc4;color:#fff}
.db{background:#edf2f7;color:#4a5568;border:1px solid #e2e8f0}
.ft{text-align:center;padding:30px;color:#a0aec0;font-size:12px}
.er{background:#fff5f5;border:1px solid #feb2b2;color:#c53030;padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.sh{display:block}
.ap-w{display:none;margin-top:16px;padding-top:16px;border-top:1px solid #e2e8f0}
.ap-w.sh{display:block}
.ap-pb{width:100%;height:8px;background:#e2e8f0;border-radius:4px;cursor:pointer;position:relative}
.ap-pb-in{height:100%;background:linear-gradient(90deg,#4ecdc4,#44b09e);border-radius:4px;width:0;pointer-events:none}
.ap-tm{text-align:right;color:#a0aec0;font-size:12px;margin-top:4px}
.ps{width:100%;margin:8px 0;-webkit-appearance:none;appearance:none;height:6px;background:#e2e8f0;border-radius:3px;outline:none}
.ps::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;border-radius:50%;background:#4ecdc4;cursor:pointer}
.ps::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#4ecdc4;cursor:pointer;border:none}
.ps-l{display:flex;justify-content:space-between;color:#a0aec0;font-size:12px}
#upb{height:28px;border-radius:14px;display:flex;align-items:center;background:#edf2f7;cursor:pointer;position:relative;margin-top:8px}
#upb:hover{background:#e2e8f0}
#upi{height:8px;border-radius:4px;background:linear-gradient(90deg,#4ecdc4,#44b09e);position:absolute;left:0;top:10px;pointer-events:none;min-width:0}
#upthumb{width:16px;height:16px;border-radius:50%;background:#4ecdc4;position:absolute;top:6px;pointer-events:none;box-shadow:0 0 6px rgba(78,205,196,.5);transform:translateX(-50%);display:none}
#upb:hover #upthumb,#upb.dragging #upthumb{display:block}
.lb{display:flex;align-items:center;gap:8px;margin-top:16px;cursor:pointer}
.lb span{font-size:14px;color:#4a5568}
.pv{display:block;width:100%;margin-top:8px;padding:10px;border-radius:20px;border:1px solid rgba(78,205,196,.4);background:transparent;color:#4ecdc4;font-size:14px;cursor:pointer}
.pv:hover{background:rgba(78,205,196,.06)}
.sc{display:flex;gap:0;margin:0 0 12px}
.sc button{flex:1;padding:9px;border:1px solid rgba(78,205,196,.4);background:transparent;color:#718096;cursor:pointer;font-size:14px;transition:all .15s}
.sc button:first-child{border-radius:10px 0 0 10px}
.sc button:last-child{border-radius:0 10px 10px 0}
.sc button.act{background:#4ecdc4;color:#fff;border-color:#4ecdc4}
#ci-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1.5px solid #cbd5e0;border-radius:20px;cursor:pointer;font-size:13px;color:#a0aec0;padding:5px 14px;transition:all .2s;user-select:none}
#ci-btn:hover{border-color:#4ecdc4;color:#4ecdc4}
#ci-btn.on{background:rgba(78,205,196,.12);border-color:#4ecdc4;color:#4ecdc4}
#ci-btn .ci-ic{font-size:16px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎵 伴奏跟练小助手</h1>
<p>仅供张老师学员使用</p>
</div>
<div class="er" id="er"></div>
<div class="card">
<div class="ul" id="ul">
<div class="ic" id="uic">📁</div>
<div class="tx" id="utx">点击选择音频文件</div>
<div class="nt" id="unt">支持 MP3 / WAV / M4A</div>
<div class="fi" id="fi" style="display:none">
 <div class="ap-pb" id="upb" style="margin-top:0"><div class="ap-pb-in" id="upi"></div><div id="upthumb"></div></div>
 <div style="display:flex;align-items:center;gap:10px;margin-top:18px"><button class="pb2" onclick="event.stopPropagation();restartPlay()" style="flex:none;padding:8px 14px;border-radius:16px;font-size:18px;line-height:1">⏮</button><button id="upb-btn" class="pb2" onclick="event.stopPropagation();unifiedPlay()" style="flex:none;padding:8px 22px;border-radius:16px;font-size:18px;line-height:1">▶</button><span id="fin" style="font-size:13px;color:#4ecdc4;flex:1;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span><span class="ap-tm" id="utm" style="margin:0;font-size:11px;color:#a0aec0">0:00 / 0:00</span><button id="cf" class="pb2" onclick="event.stopPropagation();gi.click()" style="flex:none;padding:6px 12px;border-radius:14px;font-size:13px">选取音频文件</button></div>
 <div style="font-size:11px;color:#718096;margin-top:2px;display:flex;align-items:center;justify-content:space-between"><span id="bpmn"></span><button id="ci-btn" onclick="event.stopPropagation();toggleCountIn()" title="开启预备拍"><span class="ci-ic">⏲</span>开启预备拍</button></div>
</div>
</div>
<input type="file" id="gi" accept=".mp3,.wav,.m4a,.aac,.ogg" hidden>
<audio id="op" hidden></audio>
</div>
</div>
<div class="card">
<div style="font-size:14px;color:#aaa;margin-bottom:10px">速度模式</div>
<div class="sc" id="sm">
<button class="act" data-m="bpm">BPM</button>
<button data-m="pct">百分比</button>
</div>
<div id="sb">
<span style="font-size:14px;color:#aaa">目标速度（BPM）</span>
 <input class="ps" type="range" id="bps" min="20" max="120">
<div class="ps-l"><span>最慢</span><span>原速</span></div>
<div style="text-align:center;font-size:14px;color:#4ecdc4;font-weight:600;margin-top:2px" id="bpsv">--</div>
</div>
<div id="sp" style="display:none">
<span style="font-size:14px;color:#aaa">目标速度（百分比）</span>
  <input class="ps" type="range" id="pct" min="30" max="100">
<div class="ps-l"><span>30%</span><span>100%</span></div>
<div style="text-align:center;font-size:14px;color:#4ecdc4;font-weight:600;margin-top:2px" id="pctv">--</div>
  <p style="color:#666;font-size:12px;margin-top:4px">拖动选择原曲速度的百分比</p>
</div>
</div>
</div>
<div class="card">
<div style="font-size:14px;color:#aaa;margin-bottom:10px">音频类型</div>
<div class="sc" id="am">
<button class="act" data-m="vocal">🎤 初始音频</button>
<button data-m="inst">🎵 人声消除</button>
</div>
<div id="ai" style="display:none">
<span style="font-size:12px;color:#718096">消除强度</span>
<input class="ps" type="range" id="vra" min="30" max="80" value="55">
<div class="ps-l"><span>弱</span><span>强</span></div>
</div>
</div>
<button class="bn" id="go">🎧 导出音频文件</button>
<div class="st" id="st"><p id="stx">处理中...</p><div class="pb"><div class="pb-bar" id="pbb"></div></div></div>
<div class="card ra" id="ra"><div id="rl"></div><div class="ap-w" id="apw"><div class="ap-pb" id="appb" onclick="sk(event)"><div class="ap-pb-in" id="appi"></div></div><div class="ap-tm" id="aptm">0:00 / 0:00</div></div></div>
<div class="ft"></div>
</div>
<audio id="ap" style="display:none"></audio>
<script>
let actx, file, obpm = 120, bn = '', audioBuf = null, obSig = '4/4', countInOn = false, origAudioUrl = null
let $ = id => document.getElementById(id)

function getActx() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx }

function updateSliderDots() {
  let tw = 20 // thumb width
  let pct = $('pct'), bps = $('bps')
  let pw = pct.offsetWidth, bw = bps.offsetWidth
  if (pw) {
    let f = (50 - 30) / 70, px = 10 + (pw - tw) * f
    pct.style.backgroundImage = 'radial-gradient(circle at ' + px + 'px 50%,#94a3b8 2.5px,transparent 2.5px)'; pct.style.backgroundRepeat = 'no-repeat'
  }
  if (obpm && bw) {
    let mid = Math.round((20 + obpm) / 2), f = (mid - 20) / (obpm - 20), px = 10 + (bw - tw) * f
    bps.style.backgroundImage = 'radial-gradient(circle at ' + px + 'px 50%,#94a3b8 2.5px,transparent 2.5px)'; bps.style.backgroundRepeat = 'no-repeat'
  }
}

async function processFile(f) {
  if (!f) return
  if (f.size > 100e6) { err('文件过大（限 100MB）'); return }
  file = f; bn = f.name.replace(/\.[^.]+$/, '')
  hideErr(); audioBuf = null
  $('uic').style.display = 'none'; $('utx').style.display = 'none'; $('unt').style.display = 'none'
  $('fi').style.display = 'block'; $('fin').textContent = f.name; $('utm').textContent = '0:00 / 0:00'; setProg(0)
  try {
    let buf = await getActx().decodeAudioData(await f.arrayBuffer())
    audioBuf = buf
    let bpm = detectBpm(buf)
    if (bpm) {
      obpm = bpm
      let sigScores = detectSigScores(buf, bpm)
      obSig = sigScores.sig || '4/4'
      $('bpmn').textContent = '⏱ ' + Math.round(obpm / 2) + ' BPM · ' + obSig
    } else { obpm = 120; $('bpmn').textContent = 'BPM 检测失败，默认 120' }
    $('pct').value = 100; $('pctv').textContent = '100%'; $('bps').max = obpm; $('bps').value = obpm; $('bpsv').textContent = obpm; updateSliderDots()
    let op = $('op'); if (op.src) URL.revokeObjectURL(op.src)
    origAudioUrl = URL.createObjectURL(f)
    op.src = origAudioUrl
  } catch(e) { console.error('BPM 检测失败', e); $('bpmn').textContent = 'BPM 检测失败' }
}

$('gi').onchange = e => { let f = e.target.files[0]; if (f) processFile(f) }
;(ul => { ul.addEventListener('dragover', e => { e.preventDefault() })
  ul.addEventListener('dragleave', () => {})
  ul.addEventListener('drop', e => { e.preventDefault(); let f = e.dataTransfer.files[0]; if (f) processFile(f) })
})(document.querySelector('.ul'))
document.querySelectorAll('#uic,#utx,#unt').forEach(el => el.addEventListener('click', () => { if (!$('fi').style.display || $('fi').style.display === 'none') $('gi').click() }))
let previewSrc = null; let pStartTime = 0; let previewT = 0; let stretchedBuf = null; let segOrigStart = 0
$('pct').oninput = () => {
  let v = parseInt($('pct').value); $('pctv').textContent = v + '%'
  if (audioBuf && obpm) { $('bpsv').textContent = Math.round(obpm * v / 100); $('bps').value = Math.round(obpm * v / 100) }
}
$('pct').onchange = () => { if (!audioBuf || $('upb-btn').textContent !== '⏸') return; if (document.querySelector('#am .act').dataset.m === 'inst') genVPreview(); else genPreview() }
function stopPreview() {
  if (previewSrc) { try { previewSrc.onended = null; previewSrc.stop() } catch(e) {} previewSrc = null }
}
function stopVPreview() {
  vocalAudioPlayback = false
}
function stopAllPreviews() { stopPreview(); stopVPreview(); stopCountIn() }
function stopProgTimer() { if (progTimer) { clearInterval(progTimer); progTimer = null } }
function startProgTimer() {
  if (progTimer) return
  progTimer = setInterval(() => {
    if (opDrag) return
    let op = $('op'), dur = op.duration && isFinite(op.duration) && op.duration > 0 ? op.duration : (audioBuf ? audioBuf.duration / audioBuf.sampleRate : 0), cur = 0
    if (previewSrc) cur = Math.max(0, (actx ? actx.currentTime : 0) - pStartTime)
    else cur = op.currentTime
    if (dur) {
      if (previewSrc) {
        if (previewT && previewT >= 20) {
          let origCur = segOrigStart + cur * previewT / obpm
          op.currentTime = origCur
          setProg(Math.min(100, origCur / dur * 100));
          $('utm').textContent = fmt(origCur) + ' / ' + fmt(dur)
          if (origCur >= dur && dur > 0) { $('upb-btn').textContent = '▶'; stopAllPreviews(); stopProgTimer() }
          return
        }
      }
      setProg(cur / dur * 100);
      $('utm').textContent = fmt(cur) + ' / ' + fmt(dur)
      if (cur >= dur && dur > 0) { $('upb-btn').textContent = '▶'; stopAllPreviews(); stopProgTimer() }
    }
  }, 200)
}
function setProg(pct) { let v = Math.min(100, Math.max(0, pct)); $('upi').style.width = v + '%'; $('upthumb').style.left = v + '%' }
function playbackEnded() { $('upb-btn').textContent = '▶'; stopAllPreviews(); stopProgTimer() }
function getTargetBPM() {
  let m = document.querySelector('#sm .act').dataset.m
  return m === 'bpm' ? parseInt($('bps').value) : Math.round(obpm * parseInt($('pct').value) / 100)
}
function genPreview() {
  if (!audioBuf) return
  stopCountIn(); stopVPreview()
  let op = $('op')
  try { if (!op.paused) op.pause() } catch(e) {}
  let t = getTargetBPM()
  if (!t || t < 20) return
  previewT = t; let ratio = t / obpm; segOrigStart = 0
  if (Math.abs(ratio - 1) < 0.01) { if (origAudioUrl && op.src !== origAudioUrl) { op.src = origAudioUrl }; op.playbackRate = 1; op.play(); $('upb-btn').textContent = '⏸'; startProgTimer(); return }
  let ctx = getActx(); if (ctx.state === 'suspended') ctx.resume()
  let dur = op.duration, pos = Math.max(0, op.currentTime || 0)
  if (dur > 0 && pos >= dur) { pos = 0; op.currentTime = 0 }
  let sr = audioBuf.sampleRate, segStart = Math.round(pos * sr)
  let segLen = Math.min(audioBuf.length - segStart, Math.round(30 * sr))
  if (segLen < 512) return
  let seg = actx.createBuffer(audioBuf.numberOfChannels, segLen, sr)
  for (let c = 0; c < audioBuf.numberOfChannels; c++) {
    let s = audioBuf.getChannelData(c), d = seg.getChannelData(c)
    for (let j = 0; j < segLen; j++) d[j] = s[segStart + j]
  }
  let stretched = Math.abs(ratio - 1) < 0.01 ? seg : timeStretch(seg, ratio); segOrigStart = pos
  // 处理完成后才停旧播放、启新播放，避免断音
  stopPreview()
  let src = ctx.createBufferSource()
  src.buffer = stretched; src.connect(ctx.destination)
  src.onended = playbackEnded
  src.start(0); previewSrc = src; pStartTime = ctx.currentTime
  $('upb-btn').textContent = '⏸'; startProgTimer()
}
$('bps').oninput = () => {
  let v = parseInt($('bps').value)
  if (audioBuf) { $('bpsv').textContent = v } else return
  if (obpm) { let p = Math.round(v / obpm * 100); $('pct').value = Math.max(30, Math.min(100, p)); $('pctv').textContent = $('pct').value + '%' }
}
$('bps').onchange = () => { if (!audioBuf || $('upb-btn').textContent !== '⏸') return; if (document.querySelector('#am .act').dataset.m === 'inst') genVPreview(); else genPreview() }
let sm = document.querySelectorAll('#sm button'); let am = document.querySelectorAll('#am button')
sm.forEach(b => b.onclick = () => { sm.forEach(x => x.classList.remove('act')); b.classList.add('act'); $('sb').style.display = b.dataset.m === 'bpm' ? 'block' : 'none'; $('sp').style.display = b.dataset.m === 'pct' ? 'block' : 'none'; void $('sp').offsetWidth; updateSliderDots(); if (audioBuf && $('upb-btn').textContent === '⏸') { if (document.querySelector('#am .act').dataset.m === 'inst') genVPreview(); else genPreview() } })
am.forEach(b => b.onclick = () => { am.forEach(x => x.classList.remove('act')); b.classList.add('act'); $('ai').style.display = b.dataset.m === 'inst' ? 'block' : 'none'; if (audioBuf && $('upb-btn').textContent === '⏸') { if (b.dataset.m === 'inst') genVPreview(); else genPreview() } })

let vPreviewSrc = null; let vStartTime = 0; let progTimer = null; let vocalAudioPlayback = false
$('vra').onchange = () => { if (audioBuf && $('upb-btn').textContent === '⏸' && document.querySelector('#am .act').dataset.m === 'inst') genVPreview() }
function genVPreview() {
  if (!audioBuf) return
  let ctx = getActx(); if (ctx.state === 'suspended') ctx.resume()
  if (audioBuf.numberOfChannels < 2) { err('单声道音频无法去人声'); return }
  let op = $('op')
  try { if (!op.paused) op.pause() } catch(e) {}
  let m = document.querySelector('#sm .act').dataset.m
  let t = m === 'bpm' ? parseInt($('bps').value) : Math.round(obpm * parseInt($('pct').value) / 100)
  if (!t || t < 20) return
  previewT = t; let ratio = t / obpm
  if (ratio < 0.25) ratio = 0.25; if (ratio > 4) ratio = 4
  let sr = audioBuf.sampleRate
  let curPos = op.duration ? op.currentTime : 0
  if (curPos >= op.duration) curPos = 0
  let segStart = Math.round(curPos * sr)
  let segLen = Math.min(audioBuf.length - segStart, Math.round(15 * sr))
  if (segLen < 512) return
  let seg = actx.createBuffer(audioBuf.numberOfChannels, segLen, sr)
  for (let c = 0; c < audioBuf.numberOfChannels; c++) {
    let s = audioBuf.getChannelData(c), d = seg.getChannelData(c)
    for (let j = 0; j < segLen; j++) d[j] = s[segStart + j]
  }
  // Convert to Mid/Side, time-stretch both (phase vocoder preserves pitch),
  // then scale Mid to remove vocals and convert back to L/R.
  // This avoids independent L/R phase issues from ch-1 processing in timeStretch.
  let ms = midSide(seg)
  let msStretched = Math.abs(ratio - 1) < 0.01 ? ms : timeStretch(ms, ratio)
  let processed = fromMidSide(msStretched, parseInt($('vra').value) / 100)
  // 处理完成后才停旧播放、启新播放
  stopCountIn(); stopPreview(); stopVPreview()
  let src = ctx.createBufferSource()
  src.buffer = processed; src.connect(ctx.destination)
  src.onended = playbackEnded
  src.start(0, 0)
  previewSrc = src; pStartTime = ctx.currentTime
  segOrigStart = curPos
  $('upb-btn').textContent = '⏸'; startProgTimer()
}

$('go').onclick = async () => {
  if (!file) { err('请先选择音频'); return }
  let sm = document.querySelector('#sm .act').dataset.m
  let tgt = sm === 'bpm' ? parseInt($('bps').value) : Math.round(obpm * parseInt($('pct').value) / 100)
  if (!tgt || tgt < 20) { err('请输入有效的目标速度'); return }

  $('go').disabled = true; $('st').classList.add('sh'); $('ra').classList.remove('sh'); pb(0); hideErr()

  try {
    actx = getActx()
    let buf = audioBuf
    if (!buf) buf = await actx.decodeAudioData(await file.arrayBuffer())
    pb(5)
    if (document.querySelector('#am .act').dataset.m === 'inst') { buf = removeCenter(buf, parseInt($('vra').value) / 100); pb(7) }
    stx('原始 BPM：' + obpm + (buf ? ' · ' + (detectSig(buf, obpm) || '4/4') : '')); pb(10)

    stx('处理 ' + tgt + ' BPM...'); pb(30)
    let ratio = tgt / obpm
    if (ratio < 0.25) ratio = 0.25
    if (ratio > 4) ratio = 4
    let result = timeStretch(buf, ratio); pb(60)

    if (countInOn) {
      let beats = getCountInBeats(), interval = 60 / tgt, clickLen = Math.round(buf.sampleRate * 0.06)
      let totalClicks = Math.round(beats * interval * buf.sampleRate)
      let newLen = result.length + totalClicks
      let combined = actx.createBuffer(result.numberOfChannels, newLen, result.sampleRate)
      for (let c = 0; c < result.numberOfChannels; c++) {
        let out = combined.getChannelData(c), src = result.getChannelData(c)
        for (let i = 0; i < beats; i++) {
          let pos = Math.round(i * interval * buf.sampleRate)
          let freq = i === 0 ? 1200 : 880
          for (let j = 0; j < clickLen && pos + j < totalClicks; j++) {
            let t = j / buf.sampleRate
            let env = Math.exp(-t * 80) * 0.5
            out[pos + j] += Math.sin(2 * Math.PI * freq * t) * env
          }
        }
        for (let j = 0; j < src.length; j++) out[totalClicks + j] = src[j]
      }
      result = combined; pb(80)
    }

    stx('生成文件...'); pb(85)
    let wav = toWav(result)
    let blob = new Blob([wav], {type:'audio/wav'})
    let url = URL.createObjectURL(blob)
    let a = document.createElement('a')
    a.href = url; a.download = bn + '_' + (sm === 'pct' ? $('pct').value + '%' : tgt + 'bpm') + (document.querySelector('#am .act').dataset.m === 'inst' ? '（去人声伴奏）' : '') + '.wav'; a.click()
    URL.revokeObjectURL(url)
    stx('✅ 已保存'); pb(100)
  } catch(e) { err('处理失败: ' + e.message); console.error(e) }
  $('go').disabled = false
}

function tp(btn) {
  let ap = $('ap'), url = btn.dataset.url
  if (ap.src === url && !ap.paused) { ap.pause(); btn.textContent = '▶ 播放'; $('apw').classList.remove('sh') }
  else if (ap.src === url && ap.paused) { ap.play(); btn.textContent = '⏸ 暂停'; $('apw').classList.add('sh') }

  }
}

function detectBpm(buf) {
  let sr = buf.sampleRate, ch = buf.numberOfChannels, n = buf.length
  let maxN = Math.min(n, Math.round(25 * sr))
  let mono = new Float32Array(maxN)
  for (let c = 0; c < ch; c++) { let d = buf.getChannelData(c); for (let i = 0; i < maxN; i++) mono[i] += d[i] / ch }
  // 全频段谱通量
  let fftSize = 1024, hop = Math.round(fftSize / 2)
  let nf = Math.floor((maxN - fftSize) / hop) + 1
  if (nf < 20) return null
  let win = new Float32Array(fftSize)
  for (let j = 0; j < fftSize; j++) win[j] = 0.5 * (1 - Math.cos(2 * Math.PI * j / fftSize))
  let onset = new Float32Array(nf)
  let prevMag = new Float32Array(fftSize >> 1)
  let re = new Float32Array(fftSize), im = new Float32Array(fftSize)
  for (let i = 0; i < nf; i++) {
    let off = i * hop
    for (let j = 0; j < fftSize; j++) { re[j] = mono[off + j] * win[j]; im[j] = 0 }
    fft(re, im)
    let flux = 0
    for (let j = 0; j < fftSize / 2; j++) {
      let mag = Math.sqrt(re[j] * re[j] + im[j] * im[j])
      if (i > 0) flux += Math.max(0, mag - prevMag[j])
      prevMag[j] = mag
    }
    onset[i] = flux
  }
  // 跳过第一帧（始终为0），归一化到[-1,1]
  let mo = 0
  for (let i = 1; i < nf; i++) mo += onset[i]
  mo /= (nf - 1)
  let mA = 0
  for (let i = 1; i < nf; i++) { let d = onset[i] - mo; onset[i] = d; let a = Math.abs(d); if (a > mA) mA = a }
  if (mA < 1e-10) return null
  for (let i = 1; i < nf; i++) onset[i] /= mA
  // 自相关
  let maxLag = Math.round(60 / 40 / (hop / sr))
  if (maxLag >= nf) maxLag = nf - 1
  let auto = new Float32Array(maxLag + 1)
  for (let lag = 1; lag <= maxLag; lag++) {
    let s = 0
    for (let i = 1; i < nf - lag; i++) s += onset[i] * onset[i + lag]
    auto[lag] = s / (nf - lag - 1)
  }
  // 谐波求和打分
  let bestBpm = 120, bestScore = -Infinity
  for (let bpm = 40; bpm <= 200; bpm++) {
    let T = Math.round(60 / bpm / (hop / sr))
    if (T < 2 || T > maxLag) continue
    let score = auto[T] || 0
    if (T * 2 <= maxLag) score += (auto[T * 2] || 0) / 2
    if (T * 3 <= maxLag) score += (auto[T * 3] || 0) / 3
    if (T * 4 <= maxLag) score += (auto[T * 4] || 0) / 4
    if (score > bestScore) { bestScore = score; bestBpm = bpm }
  }
  let origBestBpm = bestBpm, origBestScore = bestScore
  // 倍速检测（50%阈值防半速陷阱）
  let bpm2 = Math.min(200, bestBpm * 2)
  if (bpm2 !== bestBpm) {
    let T2 = Math.round(60 / bpm2 / (hop / sr))
    if (T2 >= 2 && T2 <= maxLag) {
      let score2 = (auto[T2] || 0)
      if (T2 * 2 <= maxLag) score2 += (auto[T2 * 2] || 0) / 2
      if (T2 * 3 <= maxLag) score2 += (auto[T2 * 3] || 0) / 3
      if (T2 * 4 <= maxLag) score2 += (auto[T2 * 4] || 0) / 4
      if (score2 >= bestScore * 0.5) { bestBpm = bpm2; bestScore = score2 }
    }
  }
  // 三倍速检测（防40→120等）
  let bpm3 = Math.min(200, bestBpm * 3)
  if (bpm3 !== bestBpm && bpm3 !== bpm2) {
    let T3 = Math.round(60 / bpm3 / (hop / sr))
    if (T3 >= 2 && T3 <= maxLag) {
      let score3 = (auto[T3] || 0)
      if (T3 * 2 <= maxLag) score3 += (auto[T3 * 2] || 0) / 2
      if (T3 * 3 <= maxLag) score3 += (auto[T3 * 3] || 0) / 3
      if (T3 * 4 <= maxLag) score3 += (auto[T3 * 4] || 0) / 4
      if (score3 >= bestScore * 0.35) { bestBpm = bpm3; bestScore = score3 }
    }
  }
  // 半速检测（仅当被倍速检测推高后才执行，防8分/16分把结果推太高）
  if (bestBpm > origBestBpm) {
    let halfBpm = Math.max(40, Math.round(origBestBpm / 2))
    if (halfBpm !== origBestBpm) {
      let Th = Math.round(60 / halfBpm / (hop / sr))
      if (Th >= 2 && Th <= maxLag) {
        let scoreHalf = (auto[Th] || 0)
        if (Th * 2 <= maxLag) scoreHalf += (auto[Th * 2] || 0) / 2
        if (Th * 3 <= maxLag) scoreHalf += (auto[Th * 3] || 0) / 3
        if (Th * 4 <= maxLag) scoreHalf += (auto[Th * 4] || 0) / 4
        if (scoreHalf >= origBestScore * 0.8) bestBpm = halfBpm
      }
    }
  }
  return Math.round(Math.max(40, Math.min(200, bestBpm)))
}

function detectSigScores(buf, bpm) {
  let def = { sig: '4/4', s4: 0, s6: 0, s3: 0 }
  if (!bpm || bpm < 40) return def
  let sr = buf.sampleRate, ch = buf.numberOfChannels, n = buf.length
  let maxN = Math.min(n, Math.round(15 * sr))
  let mono = new Float32Array(maxN)
  for (let c = 0; c < ch; c++) { let d = buf.getChannelData(c); for (let i = 0; i < maxN; i++) mono[i] += d[i] / ch }
  // Energy envelope at 10ms resolution
  let eHop = Math.round(sr * 0.01), wSize = Math.round(sr * 0.04)
  let nf = Math.floor((maxN - wSize) / eHop) + 1
  if (nf < 60) return def
  let env = new Float32Array(nf)
  for (let i = 0; i < nf; i++) {
    let off = i * eHop, e = 0
    for (let j = 0; j < wSize; j++) e += mono[off + j] * mono[off + j]
    env[i] = Math.sqrt(e / wSize)
  }
  let me = 0; for (let v of env) me += v; me /= env.length
  for (let i = 0; i < env.length; i++) env[i] -= me
  let beatFrames = Math.round(60 / bpm / (eHop / sr))
  if (beatFrames < 2) return def
  // Find best phase alignment and accumulate beat energies
  let best4 = 0, best3 = 0, best6 = 0
  let bf = beatFrames
  for (let ph = 0; ph < bf; ph++) {
    // 4-beat accumulation
    let s4 = [0, 0, 0, 0], c4 = 0
    for (let m = ph; m + 4 * bf <= env.length; m += 4 * bf) {
      for (let b = 0; b < 4; b++) s4[b] += env[m + b * bf]
      c4++
    }
    if (c4 > 0) for (let b = 0; b < 4; b++) s4[b] /= c4
    // 4/4: beat1 should be strongest, beat3 > beats2&4
    let sc4 = s4[0] - (s4[1] + s4[2] + s4[3]) / 3 + (s4[0] + s4[2]) / 2 - (s4[1] + s4[3]) / 2
    if (sc4 > best4) best4 = sc4
    // 3-beat accumulation
    let s3 = [0, 0, 0], c3 = 0
    for (let m = ph; m + 3 * bf <= env.length; m += 3 * bf) {
      for (let b = 0; b < 3; b++) s3[b] += env[m + b * bf]
      c3++
    }
    if (c3 > 0) for (let b = 0; b < 3; b++) s3[b] /= c3
    let sc3 = s3[0] - (s3[1] + s3[2]) / 2
    if (sc3 > best3) best3 = sc3
    // 6/8: beat2 > beat3 (medium accent on 4th 8th note)
    let sc6 = sc3 + Math.abs(s3[1] - s3[2])
    if (sc6 > best6) best6 = sc6
  }
  // 4/4 has strong bias: override only if another pattern is very clear
  let sig = '4/4'
  if (best6 > best4 + 0.15 && best6 > best3 + 0.05) sig = '6/8'
  else if (best3 > best4 + 0.15) sig = '3/4'
  return { sig, s4: best4, s6: best6, s3: best3 }
}

function detectSig(buf, bpm) {
  return detectSigScores(buf, bpm).sig || '4/4'
}

function fmt(s) { let m = Math.floor(s / 60), se = Math.floor(s % 60); return m + ':' + (se < 10 ? '0' : '') + se }

function sk(e) {
  let ap = $('ap')
  if (!ap.duration) return
  let rect = e.currentTarget.getBoundingClientRect()
  ap.currentTime = ((e.clientX - rect.left) / rect.width) * ap.duration
}

$('ap').addEventListener('timeupdate', () => {
  let ap = $('ap'), pi = $('appi'), tm = $('aptm')
  if (ap.duration) { pi.style.width = (ap.currentTime / ap.duration * 100) + '%'; tm.textContent = fmt(ap.currentTime) + ' / ' + fmt(ap.duration) }
})
$('ap').addEventListener('ended', () => {
  $('apw').classList.remove('sh')
  document.querySelectorAll('#rl .pb2').forEach(b => b.textContent = '▶ 播放')
})

let opDrag = false
let seekRestart = () => {
  if ($('upb-btn').textContent !== '⏸') return
  stopCountIn()
  if (document.querySelector('#am .act').dataset.m === 'inst') genVPreview()
  else genPreview()
}
function syncTimerPos() {
  if (!previewSrc || !actx) return
  let m = document.querySelector('#sm .act').dataset.m
  let t = m === 'bpm' ? parseInt($('bps').value) : Math.round(obpm * parseInt($('pct').value) / 100)
  if (!t || t < 20) return
  let opPos = $('op').currentTime || 0
  let newPStart = actx.currentTime - opPos * obpm / t
  pStartTime = newPStart
}
$('upb').addEventListener('mousedown', e => { e.stopPropagation(); opDrag = true; $('upb').classList.add('dragging'); upbSeek(e); updateProgDisplay(); syncTimerPos() })
document.addEventListener('mousemove', e => { if (opDrag) { e.preventDefault(); upbSeek(e); updateProgDisplay() } })
document.addEventListener('mouseup', () => { if (opDrag) { seekRestart() }; $('upb').classList.remove('dragging'); opDrag = false })
$('upb').addEventListener('touchstart', e => { e.stopPropagation(); opDrag = true; $('upb').classList.add('dragging'); upbSeek(e.touches[0]); updateProgDisplay(); syncTimerPos() })
document.addEventListener('touchmove', e => { if (opDrag) { e.preventDefault(); upbSeek(e.touches[0]); updateProgDisplay() } })
document.addEventListener('touchend', () => { if (opDrag) { seekRestart() }; $('upb').classList.remove('dragging'); opDrag = false })
function upbSeek(e) {
  let op = $('op'), dur = op.duration
  if (!dur || !isFinite(dur) || dur <= 0) { dur = audioBuf ? audioBuf.duration / audioBuf.sampleRate : 0 }
  if (!dur || dur <= 0) return
  let rect = $('upb').getBoundingClientRect(), x = ('touches' in e ? e.touches[0] : e).clientX
  op.currentTime = Math.max(0, Math.min(dur, ((x - rect.left) / rect.width) * dur))
}
function updateProgDisplay() {
  let op = $('op')
  if (op.duration) { setProg(op.currentTime / op.duration * 100); $('utm').textContent = fmt(op.currentTime) + ' / ' + fmt(op.duration) }
}
function unifiedPlay() {
  if (!audioBuf) return
  let b = $('upb-btn'), op = $('op')
  if (b.textContent === '⏸') {
    stopAllPreviews(); stopCountIn(); try { if (!op.paused) op.pause() } catch(e) {}
    stopProgTimer(); b.textContent = '▶'; return
  }
  stopAllPreviews(); stopCountIn(); try { if (!op.paused) op.pause() } catch(e) {}; stopProgTimer()
  if (countInOn && $('op').currentTime < 0.5) { playCountIn(); return }
  startPlayback()
}
function startPlayback() {
  if (document.querySelector('#am .act').dataset.m === 'inst') genVPreview()
  else genPreview()
}
function restartPlay() {
  if (!audioBuf) return
  $('op').currentTime = 0; segOrigStart = 0; setProg(0); $('utm').textContent = '0:00 / ' + fmt($('op').duration || 0)
  if ($('upb-btn').textContent === '⏸') { if (countInOn) { playCountIn() } else { startPlayback() } }
}
function toggleCountIn() {
  countInOn = !countInOn
  $('ci-btn').classList.toggle('on')
}
function getCountInBeats() {
  let n = parseInt(obSig.split('/')[0]); return isNaN(n) || n < 1 ? 4 : Math.min(n, 12)
}
let countInTimer = null, countInOscs = []
function stopCountIn() {
  if (countInTimer) { clearTimeout(countInTimer); countInTimer = null }
  for (let o of countInOscs) { try { o.stop() } catch(e) {} }
  countInOscs = []
}
function playCountIn() {
  let ctx = getActx(); if (ctx.state === 'suspended') ctx.resume()
  stopCountIn(); $('upb-btn').textContent = '⏸'; stopProgTimer()
  let m = document.querySelector('#sm .act').dataset.m
  let t = m === 'bpm' ? parseInt($('bps').value) : Math.round(obpm * parseInt($('pct').value) / 100)
  if (!t || t < 20) t = obpm
  let beats = getCountInBeats(), interval = 60 / t
  for (let i = 0; i < beats; i++) {
    let t2 = ctx.currentTime + i * interval
    let osc = ctx.createOscillator(), gain = ctx.createGain()
    osc.frequency.value = i === 0 ? 1200 : 880
    gain.gain.setValueAtTime(0.6, t2); gain.gain.exponentialRampToValueAtTime(0.001, t2 + 0.06)
    osc.connect(gain).connect(ctx.destination); osc.start(t2); osc.stop(t2 + 0.06)
    countInOscs.push(osc)
  }
  setProg(0); $('utm').textContent = '预备 ' + beats + ' 拍'
  countInTimer = setTimeout(() => { countInTimer = null; startPlayback() }, beats * interval * 1000 + 100)
}
$('op').addEventListener('ended', playbackEnded)

function midSide(buf) {
  let ln = buf.length, sr = buf.sampleRate, out = actx.createBuffer(2, ln, sr)
  let l = buf.getChannelData(0), r = buf.getChannelData(1)
  let m = out.getChannelData(0), s = out.getChannelData(1)
  for (let i = 0; i < ln; i++) { m[i] = (l[i] + r[i]) * 0.5; s[i] = (l[i] - r[i]) * 0.5 }
  return out
}
function fromMidSide(ms, amt) {
  let ln = ms.length, out = actx.createBuffer(2, ln, ms.sampleRate)
  let m = ms.getChannelData(0), s = ms.getChannelData(1)
  let l = out.getChannelData(0), r = out.getChannelData(1)
  let g = 1 - amt
  for (let i = 0; i < ln; i++) { let mid = m[i] * g; l[i] = mid + s[i]; r[i] = mid - s[i] }
  return out
}
function removeCenter(buf, amt) {
  if (buf.numberOfChannels < 2) return buf
  let ln = buf.length, out = actx.createBuffer(2, ln, buf.sampleRate)
  let l = buf.getChannelData(0), r = buf.getChannelData(1)
  let ol = out.getChannelData(0), or = out.getChannelData(1)
  for (let i = 0; i < ln; i++) { let m = (l[i] + r[i]) * 0.5; ol[i] = l[i] - m * amt; or[i] = r[i] - m * amt }
  return out
}

function timeStretchFast(buf, sFactor, fSize) {
  if (!fSize) fSize = 2048
  let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
  let newLen = Math.round(ln / sFactor), out = actx.createBuffer(ch, newLen, sr)
  let aHop = Math.round(fSize / 4), sHop = Math.round(aHop / sFactor)
  let win = new Float32Array(fSize)
  for (let j = 0; j < fSize; j++) win[j] = 0.5 * (1 - Math.cos(2 * Math.PI * j / fSize))
  for (let c = 0; c < ch; c++) {
    let inp = buf.getChannelData(c), oup = out.getChannelData(c), nrm = new Float32Array(newLen)
    let aPos = 0, sPos = 0
    while (aPos + fSize <= ln && sPos + fSize <= newLen) {
      for (let j = 0; j < fSize; j++) { let idx = sPos + j; oup[idx] += inp[aPos + j] * win[j]; nrm[idx] += win[j] }
      aPos += aHop; sPos += sHop
    }
    for (let j = 0; j < newLen; j++) if (nrm[j] > 0.001) oup[j] /= nrm[j]
  }
  return out
}

function fft(re, im) {
  let n = re.length
  for (let i = 1; i < n; i++) {
    let j = 0
    for (let k = 0; (1 << k) < n; k++) j = (j << 1) | ((i >> k) & 1)
    if (j > i) { let tr = re[i]; re[i] = re[j]; re[j] = tr; let ti = im[i]; im[i] = im[j]; im[j] = ti }
  }
  for (let len = 2; len <= n; len <<= 1) {
    let half = len >> 1, wRe = Math.cos(-2 * Math.PI / len), wIm = Math.sin(-2 * Math.PI / len)
    for (let i = 0; i < n; i += len) {
      let tRe = 1, tIm = 0
      for (let j = 0; j < half; j++) {
        let uRe = re[i + j], uIm = im[i + j]
        let vRe = re[i + j + half] * tRe - im[i + j + half] * tIm
        let vIm = re[i + j + half] * tIm + im[i + j + half] * tRe
        re[i + j] = uRe + vRe; im[i + j] = uIm + vIm
        re[i + j + half] = uRe - vRe; im[i + j + half] = uIm - vIm
        let nRe = tRe * wRe - tIm * wIm, nIm = tRe * wIm + tIm * wRe
        tRe = nRe; tIm = nIm
      }
    }
  }
}
function ifft(re, im) {
  let n = re.length
  for (let i = 0; i < n; i++) im[i] = -im[i]
  fft(re, im)
  for (let i = 0; i < n; i++) { re[i] /= n; im[i] = -im[i] / n }
}

function timeStretch(buf, sFactor) {
  let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
  let newLen = Math.round(ln / sFactor)
  let out = actx.createBuffer(ch, newLen, sr)
  let fSize = 2048, half = fSize >> 1, aHop = Math.round(fSize / 4), sHop = Math.round(aHop / sFactor)
  let win = new Float32Array(fSize)
  for (let j = 0; j < fSize; j++) win[j] = 0.5 * (1 - Math.cos(2 * Math.PI * j / fSize))
  for (let c = 0; c < ch; c++) {
    let inp = buf.getChannelData(c), oup = out.getChannelData(c)
    if (Math.abs(sFactor - 1) < 0.01) { for (let j = 0; j < Math.min(ln, newLen); j++) oup[j] = inp[j]; continue }
    let nrm = new Float32Array(newLen)
    let re = new Float32Array(fSize), im = new Float32Array(fSize)
    let prevPhase = new Float32Array(half), synPhase = new Float32Array(half)
    let aPos = 0, sPos = 0
    while (aPos + fSize <= ln && sPos + fSize <= newLen) {
      for (let j = 0; j < fSize; j++) { re[j] = inp[aPos + j] * win[j]; im[j] = 0 }
      fft(re, im)
      if (sPos === 0) {
        for (let k = 0; k < half; k++) {
          let mag = Math.sqrt(re[k] * re[k] + im[k] * im[k])
          let ph = Math.atan2(im[k], re[k])
          prevPhase[k] = ph; synPhase[k] = ph
          re[k] = mag * Math.cos(ph); im[k] = mag * Math.sin(ph)
        }
      } else {
        for (let k = 0; k < half; k++) {
          let mag = Math.sqrt(re[k] * re[k] + im[k] * im[k])
          let ph = Math.atan2(im[k], re[k])
          let delta = ph - prevPhase[k] - k * 2 * Math.PI * aHop / fSize
          delta -= 2 * Math.PI * Math.round(delta / (2 * Math.PI))
          synPhase[k] += (k + delta * fSize / (2 * Math.PI * aHop)) * 2 * Math.PI * sHop / fSize
          prevPhase[k] = ph
          re[k] = mag * Math.cos(synPhase[k]); im[k] = mag * Math.sin(synPhase[k])
        }
      }
      // Enforce conjugate symmetry for real-signal IFFT
      for (let k = 1; k < half; k++) { re[fSize - k] = re[k]; im[fSize - k] = -im[k] }
      ifft(re, im)
      for (let j = 0; j < fSize; j++) { oup[sPos + j] += re[j] * win[j]; nrm[sPos + j] += win[j] * win[j] }
      aPos += aHop; sPos += sHop
    }
    for (let j = 0; j < newLen; j++) if (nrm[j] > 0.001) oup[j] /= nrm[j]
  }
  return out
}

function toWav(buf) {
  let ch = buf.numberOfChannels, sr = buf.sampleRate, ln = buf.length
  let dl = ln * ch * 2, a = new ArrayBuffer(44 + dl), v = new DataView(a)
  let w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)) }
  w(0,'RIFF'); v.setUint32(4,36+dl,true); w(8,'WAVE')
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true)
  v.setUint16(22,ch,true); v.setUint32(24,sr,true)
  v.setUint32(28,sr*ch*2,true); v.setUint16(32,ch*2,true); v.setUint16(34,16,true)
  w(36,'data'); v.setUint32(40,dl,true)
  let o = 44
  for (let i = 0; i < ln; i++) for (let c = 0; c < ch; c++) {
    let s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]))
    v.setInt16(o, s < 0 ? s * 32768 : s * 32767, true); o += 2
  }
  return a
}

function pb(p) { $('pbb').style.width = p + '%' }
function err(m) { $('er').textContent = m; $('er').style.display = 'block' }
function hideErr() { $('er').style.display = 'none' }
