<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>变速伴奏生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;color:#fff;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:28px;margin-bottom:8px}
.header p{color:#aaa;font-size:14px}
.card{background:rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:16px}
.ul{border:2px dashed rgba(78,205,196,.4);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s}
.ul:hover{border-color:#4ecdc4;background:rgba(78,205,196,.05)}
.ul .ic{font-size:48px;margin-bottom:12px}
.ul .tx{font-size:16px;color:#ccc}
.ul .nt{font-size:12px;color:#888;margin-top:8px}
.bi{width:100%;height:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;text-align:center;font-size:20px;color:#fff;outline:none;margin-top:12px}
.bi:focus{border-color:#4ecdc4}
.bn{width:100%;height:52px;background:linear-gradient(135deg,#4ecdc4,#44b09e);color:#fff;border:none;border-radius:26px;font-size:18px;font-weight:600;cursor:pointer;margin-top:16px}
.bn:disabled{opacity:.5;cursor:not-allowed}
.st{text-align:center;padding:20px;display:none}
.st.sh{display:block}
.pb{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:12px;overflow:hidden}
.pb-bar{height:100%;background:#4ecdc4;width:0;transition:width .3s}
.ra{display:none;margin-top:20px}
.ra.sh{display:block}
.ri{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.ri:last-child{border-bottom:none}
.bl{font-size:20px;font-weight:700;color:#4ecdc4}
.ac{display:flex;gap:8px}
.ac button,.ac a{padding:8px 20px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;color:#fff}
.pb2{background:#4ecdc4}
.db{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.ft{text-align:center;padding:30px;color:#555;font-size:12px}
.er{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);color:#ff6b6b;padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.fn{display:none;padding:12px;background:rgba(78,205,196,.1);border-radius:8px;font-size:14px;color:#4ecdc4;text-align:center;margin-top:12px}
.fn.sh{display:block}
.bpmi{display:none;padding:8px 12px;font-size:13px;color:#aaa;text-align:center}
.bpmi.sh{display:block}
.ap-w{display:none;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
.ap-w.sh{display:block}
.ap-pb{width:100%;height:8px;background:rgba(255,255,255,.1);border-radius:4px;cursor:pointer;position:relative}
.ap-pb-in{height:100%;background:linear-gradient(90deg,#4ecdc4,#44b09e);border-radius:4px;width:0;pointer-events:none}
.ap-tm{text-align:right;color:#888;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎵 变速伴奏生成器</h1>
<p>上传音频，自动生成多种速度的伴奏</p>
</div>
<div class="er" id="er"></div>
<div class="card">
<div class="ul" onclick="gi.click()">
<div class="ic">📁</div>
<div class="tx">点击选择音频文件</div>
<div class="nt">支持 MP3 / WAV / M4A</div>
</div>
<input type="file" id="gi" accept=".mp3,.wav,.m4a,.aac,.ogg" hidden>
<div class="fn" id="fn"></div>
<div class="bpmi" id="bpmi"></div>
</div>
<div class="card">
<span style="font-size:14px;color:#aaa">目标速度（BPM）</span>
<input class="bi" type="text" id="bps">
<p style="color:#666;font-size:12px;margin-top:8px">用空格隔开，例如：60 80 100 120 140</p>
</div>
<button class="bn" id="go">🎧 生成伴奏</button>
<div class="st" id="st"><p id="stx">处理中...</p><div class="pb"><div class="pb-bar" id="pbb"></div></div></div>
<div class="card ra" id="ra"><div id="rl"></div><div class="ap-w" id="apw"><div class="ap-pb" id="appb" onclick="sk(event)"><div class="ap-pb-in" id="appi"></div></div><div class="ap-tm" id="aptm">0:00 / 0:00</div></div></div>
<div class="ft">每段音频自动添加 4 拍预备拍</div>
</div>
<audio id="ap" style="display:none"></audio>
<script>
let actx, file, obpm = 120, bn = '', audioBuf = null
let $ = id => document.getElementById(id)

$('gi').onchange = async e => {
  let f = e.target.files[0]
  if (!f) return
  if (f.size > 100e6) { err('文件过大（限 100MB）'); return }
  file = f; bn = f.name.replace(/\.[^.]+$/, '')
  $('fn').textContent = '✅ ' + f.name; $('fn').classList.add('sh')
  $('bpmi').classList.remove('sh')
  hideErr(); audioBuf = null
  try {
    let ctx = new (window.AudioContext || window.webkitAudioContext)()
    audioBuf = await ctx.decodeAudioData(await f.arrayBuffer())
    ctx.close()
    let bpm = detectBpm(audioBuf)
    if (bpm) { obpm = bpm; $('bpmi').textContent = '⏱ 原始速度: ' + obpm + ' BPM'; $('bpmi').classList.add('sh') }
  } catch(e) {}
}

$('go').onclick = async () => {
  if (!file) { err('请先选择音频'); return }
  let tgts = $('bps').value.trim().split(/[\s,，、]+/).map(Number).filter(n => !isNaN(n) && n > 0)
  if (!tgts.length) { err('请填写目标速度'); return }

  $('go').disabled = true; $('st').classList.add('sh'); $('ra').classList.remove('sh'); $('rl').innerHTML = ''; pb(0); hideErr()

  try {
    actx = new (window.AudioContext || window.webkitAudioContext)()
    let buf = audioBuf
    if (!buf) buf = await actx.decodeAudioData(await file.arrayBuffer())
    pb(5)
    let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
    stx('原始 BPM：' + obpm); pb(10)

    for (let i = 0; i < tgts.length; i++) {
      let t = tgts[i]; stx('处理 ' + t + ' BPM...'); pb(15 + 75 / tgts.length * i)
      let ratio = t / obpm
      if (ratio < 0.25) ratio = 0.25
      if (ratio > 4) ratio = 4
      let result = timeStretch(buf, ratio)

      let bd = 60 / t, cls = Math.floor(sr * 0.015), bl = Math.floor(sr * bd)
      let tl = result.length + bl * 4
      let fin = actx.createBuffer(ch, tl, sr)
      for (let c = 0; c < ch; c++) {
        let fd = fin.getChannelData(c)
        for (let b = 0; b < 4; b++) for (let j = 0; j < cls; j++) {
          let tt = j / sr
          fd[b * bl + j] = Math.sin(1000 * 2 * Math.PI * tt) * (1 - tt / 0.015)
        }
        let rd = result.getChannelData(c)
        for (let j = 0; j < rd.length; j++) fd[bl * 4 + j] = rd[j]
      }

      stx('生成 ' + t + ' BPM...'); pb(85 + 10 / tgts.length * i)
      let wav = toWav(fin)
      let url = URL.createObjectURL(new Blob([wav], {type:'audio/wav'}))
      let d = document.createElement('div'); d.className = 'ri'
      d.innerHTML = `<div><div class="bl">${t} BPM</div><div style="font-size:12px;color:#888">${bn}_${t}bpm.wav</div></div><div class="ac"><button class="pb2" data-url="${url}" onclick="tp(this)">▶ 播放</button><a class="db" href="${url}" download="${bn}_${t}bpm.wav">下载</a></div>`
      $('rl').appendChild(d); $('ra').classList.add('sh')
    }
    stx('✅ 完成！'); pb(100)
  } catch(e) { err('处理失败: ' + e.message); console.error(e) }
  $('go').disabled = false
}

function tp(btn) {
  let ap = $('ap'), url = btn.dataset.url
  if (ap.src === url && !ap.paused) { ap.pause(); btn.textContent = '▶ 播放'; $('apw').classList.remove('sh') }
  else if (ap.src === url && ap.paused) { ap.play(); btn.textContent = '⏸ 暂停'; $('apw').classList.add('sh') }
  else {
    $('apw').classList.add('sh')
    ap.src = url; ap.play(); btn.textContent = '⏸ 暂停'
    document.querySelectorAll('#rl .pb2').forEach(b => { if (b !== btn) b.textContent = '▶ 播放' })
  }
}

function detectBpm(buf) {
  let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
  let peaks = [], win = Math.floor(sr * 0.1), th = 0
  for (let c = 0; c < ch; c++) {
    let d = buf.getChannelData(c)
    for (let i = win; i < ln; i += win) {
      let e = 0; for (let j = 0; j < win; j++) e += Math.abs(d[i + j]); e /= win
      if (i > win * 2) { let r = e / (th + 0.001); if (r > 2.5) peaks.push(i) }
      th = th * 0.9 + e * 0.1
    }
  }
  if (peaks.length > 4) {
    let ints = []
    for (let i = 1; i < peaks.length; i++) ints.push(peaks[i] - peaks[i-1])
    if (ints.length > 3) {
      ints.sort((a, b) => a - b)
      let mid = ints[Math.floor(ints.length / 2)]
      let est = Math.round(60 / (mid / sr))
      if (est > 40 && est < 200) return est
    }
  }
  return null
}

function fmt(s) { let m = Math.floor(s / 60), se = Math.floor(s % 60); return m + ':' + (se < 10 ? '0' : '') + se }

function sk(e) {
  let ap = $('ap')
  if (!ap.duration) return
  let rect = e.currentTarget.getBoundingClientRect()
  ap.currentTime = ((e.clientX - rect.left) / rect.width) * ap.duration
}

$('ap').addEventListener('timeupdate', () => {
  let ap = $('ap'), pi = $('appi'), tm = $('aptm')
  if (ap.duration) { pi.style.width = (ap.currentTime / ap.duration * 100) + '%'; tm.textContent = fmt(ap.currentTime) + ' / ' + fmt(ap.duration) }
})
$('ap').addEventListener('ended', () => {
  $('apw').classList.remove('sh')
  document.querySelectorAll('#rl .pb2').forEach(b => b.textContent = '▶ 播放')
})

function timeStretch(buf, sFactor) {
  let sr = buf.sampleRate, ch = buf.numberOfChannels, ln = buf.length
  let newLen = Math.round(ln / sFactor)
  let out = actx.createBuffer(ch, newLen, sr)
  let fSize = 2048, aHop = 512, sHop = Math.round(aHop / sFactor)
  let srchD = Math.min(Math.round(aHop * 0.35), 180), srchL = 200
  let win = new Float32Array(fSize)
  for (let j = 0; j < fSize; j++) win[j] = 0.5 * (1 - Math.cos(2 * Math.PI * j / fSize))

  for (let c = 0; c < ch; c++) {
    let inp = buf.getChannelData(c), oup = out.getChannelData(c)
    if (Math.abs(sFactor - 1) < 0.01) {
      for (let j = 0; j < Math.min(ln, newLen); j++) oup[j] = inp[j]
      continue
    }
    let nrm = new Float32Array(newLen)
    let idealA = 0, sPos = 0
    while (idealA + fSize <= ln && sPos + fSize <= newLen) {
      let bestA = idealA
      if (sPos > 0) {
        let olap = Math.min(fSize - sHop, sPos, srchL)
        if (olap > 0) {
          let bestScore = -Infinity
          for (let d = -srchD; d <= srchD; d++) {
            let ca = idealA + d
            if (ca < 0 || ca + fSize > ln) continue
            let score = 0
            for (let j = 0; j < olap; j++) score += inp[ca + j] * oup[sPos + j]
            if (score > bestScore) { bestScore = score; bestA = ca }
          }
        }
      }
      for (let j = 0; j < fSize; j++) {
        let idx = sPos + j
        oup[idx] += inp[bestA + j] * win[j]
        nrm[idx] += win[j]
      }
      idealA += aHop; sPos += sHop
    }
    for (let j = 0; j < newLen; j++) if (nrm[j] > 0.001) oup[j] /= nrm[j]
  }
  return out
}

function toWav(buf) {
  let ch = buf.numberOfChannels, sr = buf.sampleRate, ln = buf.length
  let dl = ln * ch * 2, a = new ArrayBuffer(44 + dl), v = new DataView(a)
  let w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)) }
  w(0,'RIFF'); v.setUint32(4,36+dl,true); w(8,'WAVE')
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true)
  v.setUint16(22,ch,true); v.setUint32(24,sr,true)
  v.setUint32(28,sr*ch*2,true); v.setUint16(32,ch*2,true); v.setUint16(34,16,true)
  w(36,'data'); v.setUint32(40,dl,true)
  let o = 44
  for (let i = 0; i < ln; i++) for (let c = 0; c < ch; c++) {
    let s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]))
    v.setInt16(o, s < 0 ? s * 32768 : s * 32767, true); o += 2
  }
  return a
}

function stx(t) { $('stx').textContent = t }
function pb(p) { $('pbb').style.width = p + '%' }
function err(m) { $('er').textContent = m; $('er').style.display = 'block' }
function hideErr() { $('er').style.display = 'none' }
</script>
</body>
</html>
