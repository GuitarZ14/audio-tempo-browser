<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>变速伴奏生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;color:#fff;padding:20px}
.container{max-width:500px;margin:0 auto}
.header{text-align:center;padding:30px 0 20px}
.header h1{font-size:28px;margin-bottom:8px}
.header p{color:#aaa;font-size:14px}
.card{background:rgba(255,255,255,.08);border-radius:16px;padding:24px;margin-bottom:16px}
.upload-label{border:2px dashed rgba(78,205,196,.4);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer}
.upload-label:hover{border-color:#4ecdc4}
.upload-label .icon{font-size:48px;margin-bottom:12px}
.upload-label .text{font-size:16px;color:#ccc}
.upload-label .hint{font-size:12px;color:#888;margin-top:8px}
.bpm-input{width:100%;height:48px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;text-align:center;font-size:20px;color:#fff;outline:none;margin-top:12px}
.bpm-input:focus{border-color:#4ecdc4}
.btn{width:100%;height:52px;background:linear-gradient(135deg,#4ecdc4,#44b09e);color:#fff;border:none;border-radius:26px;font-size:18px;font-weight:600;cursor:pointer;margin-top:16px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status{text-align:center;padding:20px;display:none}
.status.show{display:block}
.progress{width:100%;height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:12px;overflow:hidden}
.progress-bar{height:100%;background:#4ecdc4;width:0;transition:width .3s}
.result-area{display:none;margin-top:20px}
.result-area.show{display:block}
.result-item{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.result-item:last-child{border-bottom:none}
.bpm-label{font-size:20px;font-weight:700;color:#4ecdc4}
.actions{display:flex;gap:8px}
.actions button,.actions a{padding:8px 20px;border-radius:20px;border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;color:#fff}
.play-btn{background:#4ecdc4}
.dl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2)}
.footer{text-align:center;padding:30px;color:#555;font-size:12px}
.error{background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.3);color:#ff6b6b;padding:12px;border-radius:8px;font-size:14px;margin-bottom:16px;display:none}
.fname{display:none;padding:12px;background:rgba(78,205,196,.1);border-radius:8px;font-size:14px;color:#4ecdc4;text-align:center;margin-top:12px}
.fname.show{display:block}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🎵 变速伴奏生成器</h1>
<p>上传音频，自动生成多种速度的伴奏</p>
</div>
<div class="error" id="error"></div>
<div class="card">
<div class="upload-label" id="uploadLabel" onclick="document.getElementById('fileInput').click()">
<div class="icon">📁</div>
<div class="text">点击选择音频文件</div>
<div class="hint">支持 MP3 / WAV / M4A</div>
</div>
<input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.aac,.ogg" hidden>
<div class="fname" id="fname"></div>
</div>
<div class="card">
<span style="font-size:14px;color:#aaa">目标速度（BPM）</span>
<input class="bpm-input" type="text" id="bps">
<p style="color:#666;font-size:12px;margin-top:8px">用空格隔开，例如：60 80 100 120 140</p>
</div>
<button class="btn" id="goBtn">🎧 生成伴奏</button>
<div class="status" id="status"><p id="st">处理中...</p><div class="progress"><div class="progress-bar" id="pb"></div></div></div>
<div class="card result-area" id="resultArea"><div id="resultList"></div></div>
<div class="footer">每段音频自动添加 4 拍预备拍</div>
</div>
<audio id="player" style="display:none"></audio>
<script>
const AUDIO = window.AudioContext || window.webkitAudioContext
let actx, file, origBpm = 120, baseName = ''
let $ = id => document.getElementById(id)

$('fileInput').onchange = e => {
  let f = e.target.files[0]
  if (!f) return
  if (f.size > 100e6) { show('文件过大（限 100MB）'); return }
  file = f
  baseName = f.name.replace(/\.[^.]+$/, '')
  $('fname').textContent = '✅ ' + f.name
  $('fname').classList.add('show')
  hideErr()
}

$('goBtn').onclick = async () => {
  if (!file) { show('请先选择音频'); return }
  let targets = $('bps').value.trim().split(/[\s,，、]+/).map(Number).filter(n => !isNaN(n) && n > 0)
  if (!targets.length) { show('请填写目标速度'); return }

  $('goBtn').disabled = true
  $('status').classList.add('show')
  $('resultArea').classList.remove('show')
  $('resultList').innerHTML = ''
  setP(0)
  hideErr()

  try {
    actx = new AUDIO()
    let buf = await actx.decodeAudioData(await f.arrayBuffer())
    setP(5)

    let sr = buf.sampleRate
    let ch = buf.numberOfChannels
    let len = buf.length
    origBpm = 120

    let beats = []
    for (let c = 0; c < ch; c++) {
      let data = buf.getChannelData(c)
      let energy = 0
      let windowSize = Math.floor(sr * 0.05)
      for (let i = windowSize; i < len; i += windowSize) {
        let e = 0
        for (let j = 0; j < windowSize; j++) e += Math.abs(data[i + j])
        e /= windowSize
        if (i > windowSize * 3 && e > energy * 2.5) beats.push(i)
        energy = energy * 0.9 + e * 0.1
      }
    }
    if (beats.length > 4) {
      let intervals = []
      for (let i = 1; i < beats.length; i++) intervals.push(beats[i] - beats[i - 1])
      intervals.sort((a, b) => a - b)
      let med = intervals[Math.floor(intervals.length / 2)]
      let bpm = Math.round(60 / (med / sr))
      if (bpm > 30 && bpm < 300) origBpm = bpm
    }

    for (let i = 0; i < targets.length; i++) {
      let tgt = targets[i]
      setT(`正在处理 ${tgt} BPM...`); setP(10 + 80 / targets.length * i)

      let ratio = origBpm / tgt
      let newLen = Math.round(len * ratio)
      let out = actx.createBuffer(ch, newLen, sr)
      for (let c = 0; c < ch; c++) {
        let inp = buf.getChannelData(c)
        let oup = out.getChannelData(c)
        for (let j = 0; j < newLen; j++) {
          let pos = j / ratio
          let idx = Math.floor(pos)
          let frac = pos - idx
          if (idx + 1 < len) oup[j] = inp[idx] * (1 - frac) + inp[idx + 1] * frac
          else if (idx < len) oup[j] = inp[idx]
        }
      }

      let bd = 60 / tgt
      let cls = Math.floor(sr * 0.015)
      let bl = Math.floor(sr * bd)
      let tl = out.length + bl * 4
      let fin = actx.createBuffer(ch, tl, sr)
      for (let c = 0; c < ch; c++) {
        let fd = fin.getChannelData(c)
        for (let b = 0; b < 4; b++) {
          for (let j = 0; j < cls; j++) {
            let t = j / sr
            let v = Math.sin(1000 * 2 * Math.PI * t) * (1 - t / 0.015)
            fd[b * bl + j] = v
          }
        }
        let outD = out.getChannelData(c)
        for (let j = 0; j < outD.length; j++) fd[bl * 4 + j] = outD[j]
      }

      setT(`生成 ${tgt} BPM...`); setP(70 + 20 / targets.length * i)
      let wav = bufferToWav(fin)
      let blob = new Blob([wav], {type:'audio/wav'})
      let url = URL.createObjectURL(blob)

      let div = document.createElement('div')
      div.className = 'result-item'
      div.innerHTML = `<div><div class="bpm-label">${tgt} BPM</div><div style="font-size:12px;color:#888">${baseName}_${tgt}bpm.wav</div></div><div class="actions"><button class="play-btn" onclick="play('${url}')">▶ 播放</button><a class="dl-btn" href="${url}" download="${baseName}_${tgt}bpm.wav">下载</a></div>`
      $('resultList').appendChild(div)
      $('resultArea').classList.add('show')
    }
    setT('✅ 完成！'); setP(100)
  } catch(e) { show('处理失败: ' + e.message); console.error(e) }
  $('goBtn').disabled = false
}

function play(url) {
  let p = document.getElementById('player')
  p.src = url; p.play()
}

function bufferToWav(buf) {
  let ch = buf.numberOfChannels, sr = buf.sampleRate, len = buf.length
  let dataLen = len * ch * 2
  let arr = new ArrayBuffer(44 + dataLen)
  let v = new DataView(arr)
  let w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)) }
  w(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true); w(8, 'WAVE')
  w(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true)
  v.setUint16(22, ch, true); v.setUint32(24, sr, true)
  v.setUint32(28, sr * ch * 2, true); v.setUint16(32, ch * 2, true); v.setUint16(34, 16, true)
  w(36, 'data'); v.setUint32(40, dataLen, true)
  let off = 44
  for (let i = 0; i < len; i++)
    for (let c = 0; c < ch; c++) {
      let s = Math.max(-1, Math.min(1, buf.getChannelData(c)[i]))
      v.setInt16(off, s < 0 ? s * 32768 : s * 32767, true)
      off += 2
    }
  return arr
}

function setT(t) { $('st').textContent = t }
function setP(p) { $('pb').style.width = p + '%' }
function show(m) { $('error').textContent = m; $('error').style.display = 'block' }
function hideErr() { $('error').style.display = 'none' }
</script>
</body>
</html>
